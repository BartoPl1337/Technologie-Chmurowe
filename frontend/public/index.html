<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notatnik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; }
    #user-info { font-size: 0.9rem; display: flex; gap: 1rem; align-items: center; }
    #btn-logout { background: transparent; border: 1px solid #fff; color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; }

    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    /* Auth */
    #auth-section { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.12); padding: 2rem; max-width: 360px; margin: 4rem auto; }
    #auth-section h2 { margin-bottom: 1.2rem; font-size: 1.3rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #555; }
    input[type=text], input[type=password], textarea {
      border: 1px solid #ccc; border-radius: 4px; padding: 0.5rem 0.7rem;
      font-size: 0.95rem; width: 100%; outline: none; transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: #1a73e8; }
    .btn-primary {
      background: #1a73e8; color: #fff; border: none; border-radius: 4px;
      padding: 0.6rem 1.2rem; font-size: 0.95rem; cursor: pointer; width: 100%;
    }
    .btn-primary:hover { background: #1558b0; }
    .auth-toggle { margin-top: 0.8rem; font-size: 0.85rem; text-align: center; color: #555; }
    .auth-toggle a { color: #1a73e8; cursor: pointer; }
    .error-msg { color: #d93025; font-size: 0.85rem; min-height: 1.2em; }

    /* Notes */
    #notes-section { display: none; }
    #add-note-form { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 1.2rem; margin-bottom: 1.5rem; }
    #add-note-form h2 { margin-bottom: 0.8rem; font-size: 1rem; }
    #add-note-form input, #add-note-form textarea { margin-bottom: 0.6rem; }
    #add-note-form textarea { min-height: 80px; resize: vertical; }
    #add-note-form .btn-primary { width: auto; }

    #notes-list { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }

    .note-card {
      background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1);
      padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem;
    }
    .note-card h3 { font-size: 1rem; word-break: break-word; }
    .note-card p { font-size: 0.875rem; color: #555; flex: 1; white-space: pre-wrap; word-break: break-word; }
    .note-meta { font-size: 0.75rem; color: #999; }
    .note-actions { display: flex; gap: 0.5rem; margin-top: 0.3rem; }
    .btn-edit, .btn-delete {
      border: none; border-radius: 4px; padding: 0.3rem 0.7rem;
      font-size: 0.8rem; cursor: pointer;
    }
    .btn-edit { background: #e8f0fe; color: #1a73e8; }
    .btn-edit:hover { background: #c5d8fc; }
    .btn-delete { background: #fce8e6; color: #d93025; }
    .btn-delete:hover { background: #f5c6c2; }

    /* Modal */
    #modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
      align-items: center; justify-content: center; z-index: 100;
    }
    #modal-overlay.open { display: flex; }
    #modal {
      background: #fff; border-radius: 8px; padding: 1.5rem;
      width: 100%; max-width: 420px; box-shadow: 0 4px 16px rgba(0,0,0,.2);
    }
    #modal h2 { margin-bottom: 1rem; font-size: 1rem; }
    #modal input, #modal textarea { margin-bottom: 0.6rem; }
    #modal textarea { min-height: 100px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
    .btn-cancel { background: #f1f3f4; border: none; border-radius: 4px; padding: 0.5rem 1rem; cursor: pointer; }

    #empty-state { text-align: center; color: #999; padding: 3rem 0; }
  </style>
</head>
<body>
<header>
  <h1>Notatnik</h1>
  <div id="user-info" style="display:none">
    <span id="username-display"></span>
    <button id="btn-logout">Wyloguj</button>
  </div>
</header>

<!-- Auth -->
<section id="auth-section">
  <h2 id="auth-title">Logowanie</h2>
  <div class="form-group">
    <label for="auth-username">Nazwa użytkownika</label>
    <input id="auth-username" type="text" autocomplete="username" />
  </div>
  <div class="form-group">
    <label for="auth-password">Hasło</label>
    <input id="auth-password" type="password" autocomplete="current-password" />
  </div>
  <p class="error-msg" id="auth-error"></p>
  <button class="btn-primary" id="auth-submit">Zaloguj</button>
  <p class="auth-toggle">
    <span id="auth-toggle-text">Nie masz konta?</span>
    <a id="auth-toggle-link">Zarejestruj się</a>
  </p>
</section>

<!-- Notes -->
<main id="notes-section">
  <form id="add-note-form">
    <h2>Nowa notatka</h2>
    <input type="text" id="new-title" placeholder="Tytuł" required />
    <textarea id="new-content" placeholder="Treść (opcjonalnie)"></textarea>
    <p class="error-msg" id="add-error"></p>
    <button type="submit" class="btn-primary">Dodaj</button>
  </form>

  <div id="notes-list"></div>
  <div id="empty-state" style="display:none">Brak notatek. Dodaj pierwszą!</div>
</main>

<!-- Edit modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Edytuj notatkę</h2>
    <input type="text" id="edit-title" placeholder="Tytuł" />
    <textarea id="edit-content" placeholder="Treść"></textarea>
    <p class="error-msg" id="edit-error"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Anuluj</button>
      <button class="btn-primary" id="modal-save" style="width:auto">Zapisz</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
